# Refresh the bundled mempool mining-pools list AND the SVG logos. Two
# ways to run:
#   1. Nightly (cron at 03:17 UTC) -- the default cadence.
#   2. On demand via Actions -> Run workflow, or from the CLI:
#        gh workflow run refresh-pools-v2.yml --ref main
#      Use the manual trigger to refresh ahead of cron, or to retry
#      after an upstream outage. Both modes share the same diff check
#      and the same no-op exit when nothing upstream has changed.
#
# What this workflow touches:
#   - backend/src/tasks/_ordpool/pools-v2.json  (from mempool/mining-pools)
#   - frontend/src/resources/mining-pools/*.svg (from mempool/mining-pool-logos)
#
# Logo sync rules:
#   - ADD new logos that exist upstream but not locally.
#   - UPDATE local logos whose git blob SHA differs from upstream.
#   - NEVER DELETE local logos (old logos stay even if upstream removes
#     them; preserves history of retired pools).
#
# Upstream's sync-assets.js (frontend/sync-assets.js) was the original
# build-time sync. Its mining-pool-logos branch is disabled in the same
# // HACK -- Ordpool pattern as the promo-video branch; this workflow
# takes over the role and pre-warms the SVGs into git.
name: Refresh pools-v2.json bundle

on:
  schedule:
    # 03:17 UTC -- off-peak; avoids GitHub's top-of-the-hour cron rush.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write   # to push directly to main and stage_prod

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0       # need full history to push both branches
          ref: main

      - name: Refresh bundled pools-v2.json from mempool/mining-pools
        run: |
          set -euo pipefail
          curl -sSfL --retry 3 --retry-delay 5 \
            "https://raw.githubusercontent.com/mempool/mining-pools/master/pools-v2.json" \
            -o /tmp/pools-v2.upstream.json
          # Sanity: must be valid JSON
          python3 -m json.tool /tmp/pools-v2.upstream.json > /dev/null
          # Sanity: size in believable range (10 KB - 1 MB)
          SZ=$(wc -c < /tmp/pools-v2.upstream.json)
          if [ "$SZ" -lt 10000 ] || [ "$SZ" -gt 1000000 ]; then
            echo "Refusing pools-v2.json with suspicious size $SZ bytes"
            exit 1
          fi
          # Unconditional overwrite. If bytes are identical, git status
          # below sees no change and we exit clean.
          cp /tmp/pools-v2.upstream.json backend/src/tasks/_ordpool/pools-v2.json

      - name: Sync mining-pool logos from mempool/mining-pool-logos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p frontend/src/resources/mining-pools

          # GitHub contents API returns one entry per file with its git
          # blob SHA -- the same SHA `git hash-object` computes locally,
          # so we can compare exactly without downloading the file first.
          # Authorization header bumps the rate limit from 60/hr (unauth)
          # to 1000/hr (auth) -- one call per day, but cheap insurance.
          curl -sSfL --retry 3 --retry-delay 5 \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/mempool/mining-pool-logos/contents/?ref=master" \
            -o /tmp/upstream-listing.json
          # Sanity: must be a non-empty JSON array
          python3 -c "import json,sys; d=json.load(open('/tmp/upstream-listing.json')); assert isinstance(d, list) and len(d) > 0, 'empty or wrong shape'"

          ADDED=0
          UPDATED=0
          UNCHANGED=0

          # Process substitution keeps counters in the outer shell.
          while IFS=$'\t' read -r upstream_sha upstream_name; do
            local_file="frontend/src/resources/mining-pools/$upstream_name"
            if [ -f "$local_file" ]; then
              local_sha=$(git hash-object "$local_file")
              if [ "$upstream_sha" = "$local_sha" ]; then
                UNCHANGED=$((UNCHANGED + 1))
                continue
              fi
              echo "  update  $upstream_name (local=${local_sha:0:8} -> upstream=${upstream_sha:0:8})"
              UPDATED=$((UPDATED + 1))
            else
              echo "  add     $upstream_name (upstream=${upstream_sha:0:8})"
              ADDED=$((ADDED + 1))
            fi
            curl -sSfL --retry 3 --retry-delay 5 \
              "https://raw.githubusercontent.com/mempool/mining-pool-logos/master/$upstream_name" \
              -o "$local_file"
          done < <(jq -r '.[] | select(.name | endswith(".svg")) | "\(.sha)\t\(.name)"' /tmp/upstream-listing.json)

          echo "Logo sync summary: added=$ADDED, updated=$UPDATED, unchanged=$UNCHANGED"

      - name: Check for changes
        id: diff
        run: |
          set -euo pipefail
          git status --porcelain \
            backend/src/tasks/_ordpool/pools-v2.json \
            frontend/src/resources/mining-pools/ \
            > /tmp/changes.txt
          if [ ! -s /tmp/changes.txt ]; then
            echo "Nothing changed upstream. Exiting cleanly."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat /tmp/changes.txt

          # Counters for the commit message
          JSON_CHANGED=0
          if grep -q "pools-v2.json" /tmp/changes.txt; then JSON_CHANGED=1; fi
          # ?? = untracked (new file), M / space-M = modified
          LOGOS_NEW=$(grep -c "^?? frontend/src/resources/mining-pools/" /tmp/changes.txt || true)
          LOGOS_UPDATED=$(grep -cE "^( M|M ) frontend/src/resources/mining-pools/" /tmp/changes.txt || true)

          echo "json_changed=$JSON_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "logos_new=$LOGOS_NEW"         >> "$GITHUB_OUTPUT"
          echo "logos_updated=$LOGOS_UPDATED" >> "$GITHUB_OUTPUT"
          echo "changed=true"                 >> "$GITHUB_OUTPUT"

      - name: Commit and push to main + stage_prod
        if: steps.diff.outputs.changed == 'true'
        env:
          JSON_CHANGED:   ${{ steps.diff.outputs.json_changed }}
          LOGOS_NEW:      ${{ steps.diff.outputs.logos_new }}
          LOGOS_UPDATED:  ${{ steps.diff.outputs.logos_updated }}
        run: |
          set -euo pipefail

          # actions/checkout@v5 doesn't set git identity by default.
          # Configure the github-actions[bot] noreply identity so the
          # commit attribution is the truthful "this is a bot" string.
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add backend/src/tasks/_ordpool/pools-v2.json \
                  frontend/src/resources/mining-pools/

          # Build a title that names whichever surface actually changed.
          # The literal CI-skip marker in the message tail prevents
          # build-backend / build-frontend / backend-integration /
          # test-count-floor-backend from firing on this bot push. Pool
          # updates and logo refreshes ride the next regular code commit.
          if [ "$JSON_CHANGED" = "1" ] && [ "$LOGOS_NEW" = "0" ] && [ "$LOGOS_UPDATED" = "0" ]; then
            TITLE="chore(backend): refresh bundled pools-v2.json"
          elif [ "$JSON_CHANGED" = "0" ]; then
            TITLE="chore(frontend): refresh mining-pool logos ($LOGOS_NEW new, $LOGOS_UPDATED updated)"
          else
            TITLE="chore: refresh pools-v2.json + mining-pool logos ($LOGOS_NEW new, $LOGOS_UPDATED updated)"
          fi

          git commit -m "${TITLE} [skip ci]"

          # Push the new commit to main.
          git push origin main

          # Mirror to stage_prod. Fetch first so we know its tip.
          git fetch origin stage_prod
          git checkout stage_prod
          # Fast-forward stage_prod onto main's new tip. If stage_prod
          # is ahead of main for any other reason (branch-sync convention
          # keeps them in lock-step), --ff-only fails loudly and the
          # workflow stops; a maintainer resolves.
          git merge --ff-only main
          git push origin stage_prod
