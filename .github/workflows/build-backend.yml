name: Build Backend

on:
  workflow_dispatch:
  push:
    branches: [ stage_prod ]
    paths:
      - 'backend/**'
      - 'rust/gbt/**'
      - '.github/workflows/build-backend.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Read rust-toolchain
      id: rust
      run: echo "version=$(cat rust/gbt/rust-toolchain)" >> "$GITHUB_OUTPUT"

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ steps.rust.outputs.version }}

    - name: Cache Rust build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust/gbt/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust/gbt/**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install dependencies (preinstall builds rust-gbt; we DON'T ship node_modules)
      working-directory: backend
      run: npm ci

    - name: Build TypeScript -> dist/
      working-directory: backend
      run: npm run build

    - name: Prepare slim deploy artifact (compiled JS + our rust-gbt binding only)
      working-directory: backend
      run: |
        rm -rf deploy && mkdir deploy
        cp -r dist/. deploy/
        cp -r rust-gbt deploy/rust-gbt
        cp package.json package-lock.json deploy/
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('deploy/package.json', 'utf8'));
          delete pkg.scripts.preinstall;
          pkg.dependencies['rust-gbt'] = 'file:./rust-gbt';
          pkg.scripts.start = 'node --max-old-space-size=4096 index.js';
          fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2) + '\n');
        "
        sed -i 's|file:../rust-gbt|file:./rust-gbt|g' deploy/package-lock.json
        echo "=== artifact contents ==="
        ls -lh deploy
        du -sh deploy

    - name: Deploy to ordpool-space/ordpool-backend-build
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      working-directory: backend
      run: |
        npx angular-cli-ghpages \
          --repo=https://github.com/ordpool-space/ordpool-backend-build.git \
          --branch=main \
          --dir=deploy \
          --name="The Buildbot" \
          --email=noreply@haushoppe.art \
          --no-notfound \
          --no-nojekyll
