name: Build Frontend

on:
  workflow_dispatch:
  push:
    # Two stages share the same backend (api.ordpool.space) — only the
    # frontend artifact branch differs. Pushing to stage_prod deploys to
    # ordpool.space; pushing to stage_test deploys to a Pages preview
    # branch (test domain, e.g. test.ordpool.space).
    branches: [ stage_prod, stage_test ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    # mempool-frontend-config.json is gitignored, so on CI it doesn't exist
    # and generate-config defaults to BASE_MODULE=mempool — which picks
    # src/index.mempool.html as the deploy template (wrong title, og tags).
    # config:defaults:ordpool writes the right config file then runs
    # generate-config, so src/index.ordpool.html becomes the template.
    - name: Configure ordpool defaults
      working-directory: frontend
      run: npm run config:defaults:ordpool

    - name: Build (production, single English locale — we never translated ordpool components)
      working-directory: frontend
      run: npm run build

    - name: Sanity-check ordpool branding made it into the build
      working-directory: frontend
      run: |
        echo "=== <title> in deployed index.html ==="
        grep -oE '<title>[^<]+</title>' dist/mempool/browser/index.html
        grep -q 'ordpool.space' dist/mempool/browser/index.html

    - name: Sanity-check the deploy artifact
      working-directory: frontend
      run: |
        echo "=== root listing ==="
        ls -lh dist/mempool/browser | head -30
        echo "=== _redirects (must be present, must point at api.ordpool.space) ==="
        cat dist/mempool/browser/_redirects
        test -s dist/mempool/browser/_redirects
        grep -q 'api.ordpool.space/content' dist/mempool/browser/_redirects
        grep -q 'api.ordpool.space/preview' dist/mempool/browser/_redirects
        grep -q 'ordinals.com/r' dist/mempool/browser/_redirects

    - name: Deploy to ordpool-space/ordpool-frontend-build
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      working-directory: frontend
      # Artifact branch matches the source ref: stage_prod → stage_prod,
      # stage_test → stage_test. Cloudflare Pages serves ordpool.space from
      # stage_prod; the stage_test branch is for a Pages preview/test
      # domain that shares the same api.ordpool.space backend.
      run: |
        npx angular-cli-ghpages \
          --repo=https://github.com/ordpool-space/ordpool-frontend-build.git \
          --branch=${{ github.ref_name }} \
          --dir=dist/mempool/browser \
          --name="The Buildbot" \
          --email=noreply@haushoppe.art \
          --no-notfound \
          --no-nojekyll
