@if (loaded && rows.length > 0) {
  <thead class="text-primary">
    <tr><th colspan="2">OpenTimestamps</th></tr>
  </thead>
  <tbody>
    <tr>
      <td class="td-width">Calendar commits</td>
      <td>{{ rows.length }}</td>
    </tr>
    @for (row of rows; track row.txid) {
      <tr>
        <td>{{ row.calendar }}</td>
        <td>
          <a [routerLink]="['/tx/' | relativeUrl, row.txid]" title="{{ row.txid }}">
            {{ row.txid | shortenString : 13 }}
          </a>
        </td>
      </tr>
    }
    <!-- HACK -- Ordpool: empty .bg-box spacer row matches the trailing
         spacer every other protocol section ends with (CAT-21:42,
         Inscriptions:98, ...). Provides the visual breathing room
         before the next thead. -->
    <tr class="bg-box">
      <td colspan="2"></td>
    </tr>
  </tbody>
}
