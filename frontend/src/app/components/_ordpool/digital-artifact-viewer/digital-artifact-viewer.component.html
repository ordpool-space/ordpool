<app-src20-viewer
  *ngIf="whatToShow === 'src20'"
  [showDetails]="showDetails"
  [parsedSrc20]="asSrc20"
/>

<app-runestone-viewer
  *ngIf="whatToShow === 'runestone'"
  [showDetails]="showDetails"
  [parsedRunestone]="asRunestone"
/>

<!-- Alkanes is a sub-protocol of Runes carried inside the Runestone
     PROTOCOL tag, but it gets its own viewer so the rune-only sections
     (etching / mint / pointer / cenotaph) stay clean. -->
<app-alkanes-viewer
  *ngIf="whatToShow === 'runestone'"
  [showDetails]="showDetails"
  [parsedRunestone]="asRunestone"
/>
