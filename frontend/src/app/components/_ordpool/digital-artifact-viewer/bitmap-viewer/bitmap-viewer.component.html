@if (vm$ | async; as vm) {
  <div class="mt-3">
    <p class="mb-2 smaller-text">
      A land claim for block {{ formatHeight(vm.height) }}. One square per transaction,
      sized by output value. This is a visual representation of this &ldquo;bitmap&rdquo;.
    </p>
    @if (vm.svg; as svg) {
      <div class="bitmap-canvas" [innerHTML]="svg"></div>
    }
  </div>
}
